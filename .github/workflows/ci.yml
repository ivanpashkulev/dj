name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

  build:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 7

  docker:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKER_HOST: unix:///Users/vankata/.docker/run/docker.sock
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short_sha }}

  update-devops:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Extract short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Checkout devops repo
        uses: actions/checkout@v4
        with:
          repository: ivanpashkulev/devops
          token: ${{ secrets.DEVOPS_DEPLOY_TOKEN }}

      - name: Update docker-compose.yml
        run: |
          sed -i "s|image: ghcr.io/ivanpashkulev/dj:.*|image: ghcr.io/ivanpashkulev/dj:${{ steps.sha.outputs.short_sha }}|" docker-compose.yml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DEVOPS_DEPLOY_TOKEN }}
          commit-message: |
            Deploy dj:${{ steps.sha.outputs.short_sha }}

            Automated deployment from dj repo commit ${{ github.sha }}

            Co-Authored-By: Paperclip <noreply@paperclip.ing>
          committer: DJ Tech Lead <noreply@paperclip.ing>
          author: DJ Tech Lead <noreply@paperclip.ing>
          branch: deploy-dj-${{ steps.sha.outputs.short_sha }}
          title: Deploy dj:${{ steps.sha.outputs.short_sha }}
          body: |
            Automated deployment of DJ service

            **Image:** `ghcr.io/ivanpashkulev/dj:${{ steps.sha.outputs.short_sha }}`
            **Source commit:** ${{ github.sha }}
            **Source PR:** ${{ github.event.pull_request.html_url || 'Direct push to main' }}

            Merge to deploy.
