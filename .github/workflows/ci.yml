name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

  build:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout devops repo
        uses: actions/checkout@v4
        with:
          repository: ivanpashkulev/devops
          token: ${{ secrets.DEVOPS_DEPLOY_TOKEN }}
          path: devops

      - name: Update docker-compose.yml
        working-directory: devops
        run: |
          sed -i "s|image: ghcr.io/ivanpashkulev/dj:.*|image: ghcr.io/ivanpashkulev/dj:${{ steps.sha.outputs.short_sha }}|" docker-compose.yml
          git config user.name "DJ Tech Lead"
          git config user.email "noreply@paperclip.ing"
          git checkout -b deploy-dj-${{ steps.sha.outputs.short_sha }}
          git add docker-compose.yml
          git commit -m "Deploy dj:${{ steps.sha.outputs.short_sha }}

Automated deployment from dj repo commit ${{ github.sha }}

Co-Authored-By: Paperclip <noreply@paperclip.ing>"
          git push origin deploy-dj-${{ steps.sha.outputs.short_sha }}

      - name: Create deployment PR
        working-directory: devops
        env:
          GH_TOKEN: ${{ secrets.DEVOPS_DEPLOY_TOKEN }}
        run: |
          gh pr create \
            --title "Deploy dj:${{ steps.sha.outputs.short_sha }}" \
            --body "Automated deployment of DJ service

**Image:** \`ghcr.io/ivanpashkulev/dj:${{ steps.sha.outputs.short_sha }}\`
**Source commit:** ${{ github.sha }}
**Source PR:** ${{ github.event.pull_request.html_url || 'Direct push to main' }}

Merge to deploy." \
            --base main
